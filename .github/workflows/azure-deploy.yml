name: Deploy Enterprise AI Agent

on:
  push:
    branches:
      - main
      - feature/github-actions-cicd

env:
  ACR_NAME: aicontainerregistry123
  IMAGE_NAME: enterprise-ai-agent
  WEBAPP_NAME: ai-agent-app-12345
  RESOURCE_GROUP: ai-agent-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: |
        docker login $ACR_NAME.azurecr.io -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }} 

    - name: Build Docker image
      run: |
        docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} .

    - name: Push Docker image
      run: |
        docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

    - name: Update Web App container
      run: |
        az webapp config container set \
          --name $WEBAPP_NAME \
          --resource-group $RESOURCE_GROUP \
          --docker-custom-image-name $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

    - name: Restart Web App
      run: |
        az webapp restart \
          --name $WEBAPP_NAME \
          --resource-group $RESOURCE_GROUP